name: Update Lamotrigine Papers

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 오전 10시 (한국시간 = UTC+9, 01:00 UTC)
  workflow_dispatch:      # 수동 실행 버튼도 활성화

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests anthropic

      - name: Fetch and process papers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_papers.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update papers $(date +'%Y-%m-%d')"
          git push
